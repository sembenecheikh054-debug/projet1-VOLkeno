<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page d'inscription</title>
     <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-600">
     <div class=" flex items-center justify-center mt-[96px] ">

            <div class="">
                <div>
                    <p class="text-white font-bold mb-[10px] ml-[140px]">RED PRODUCT</p>
                </div>
                <form action="" class="w-[384px] h-[424,25px] bg-white rounded-[4px] flex-col flex justify-center">
                    <p class="m-2">Inscriver vous en tant que Admin</p>
                    <div class=" border-b p-3 m-2">
                        <input type="email" name="" id="" placeholder="Nom">
                    </div>
                    <div class=" border-b p-3 m-2">
                        <input type="email" name="" id="" placeholder="E-mail">
                    </div>

                    <div class="mt-5  border-b p-3 m-2">
                        <input type="password" name="" id="" placeholder="Mot de passe">

                    </div>
                    <div class="mt-5 m-2">
                        <input type="checkbox" name="" id="">
                        <label for="">Accepter les termes et la politique</label>

                    </div>


                    <button class="mt-4 p-2 bg-gray-700 rounded-lg w-[320px] ml-[32px] mb-2 text-white" type="button">S'
                        inscrire</button>
                </form>
                <div class="flex flex-col items-center">
                    
                    <p>Vous n avez pas de compte? <a href="Accueil.html" class="text-yellow-300">Se connecter</a></p>
                </div>

            </div>
        </div>
</body>
</html>
