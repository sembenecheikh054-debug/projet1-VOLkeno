<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page d'inscription</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-600 min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-md">

        <!-- titre -->
        <p class="text-white font-bold mb-4 text-center text-xl">RED PRODUCT</p>

        <!-- formulaire -->
        <form action="" class="bg-white rounded-lg p-6 flex flex-col gap-4 w-full">

            <p class="font-semibold text-gray-700">Inscrivez vous en tant que Admin</p>

            <div class="border-b pb-2">
                <input type="text" id="nom" placeholder="Nom"
                    class="w-full outline-none p-1">
            </div>

            <div class="border-b pb-2">
                <input type="email" id="email" placeholder="E-mail"
                    class="w-full outline-none p-1">
            </div>

            <div class="border-b pb-2">
                <input type="password" id="password" placeholder="Mot de passe"
                    class="w-full outline-none p-1">
            </div>

            <div class="flex items-center gap-2">
                <input type="checkbox" id="confirm">
                <label for="confirm" class="text-sm text-gray-600">
                    Accepter les termes et la politique
                </label>
            </div>

            <div id="erreur" class="text-red-500 text-sm"></div>

            <button onclick="register()" type="button"
                class="bg-gray-700 text-white p-3 rounded-lg w-full hover:bg-gray-800">
                S'inscrire
            </button>

        </form>

        <!-- lien connexion -->
        <p class="text-center text-white mt-4 text-sm">
            Vous avez déjà un compte ?
            <a href="index.html" class="text-yellow-300 hover:underline">Se connecter</a>
        </p>

    </div>

    <script src="api.js"></script>
    <script src="inscription.js"></script>
</body>
</html>
