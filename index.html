<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>projet1</title>
    <script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-600 min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-md">

        <!-- titre -->
        <p class="text-white font-bold mb-4 text-center text-xl">RED PRODUCT</p>

        <!-- formulaire -->
        <form class="bg-white rounded-lg p-6 flex flex-col gap-4 w-full">

            <p class="font-semibold text-gray-700">Connectez vous en tant que Admin</p>

            <div class="border-b pb-2">
                <input type="email" id="email" placeholder="E-mail"
                    class="w-full outline-none p-1">
            </div>

            <div class="border-b pb-2">
                <input type="password" id="password" placeholder="Mot de passe"
                    class="w-full outline-none p-1">
            </div>

            <div class="flex items-center gap-2">
                <input type="checkbox" id="cheik">
                <label for="cheik" class="text-sm text-gray-600">Garder-moi connecté</label>
            </div>

            <div id="erreur" class="text-red-500 text-sm"></div>

            <button onclick="login()" type="button"
                class="bg-gray-700 text-white p-3 rounded-lg w-full hover:bg-gray-800">
                Se connecter
            </button>

        </form>

        <!-- liens -->
        <div class="flex flex-col items-center gap-2 mt-4">
            <a href="mdpoub.html" class="text-yellow-300 text-sm hover:underline">
                Mot de passe oublié ?
            </a>
            <p class="text-white text-sm">
                Vous n'avez pas de compte ?
                <a href="sinscrire.html" class="text-yellow-300 hover:underline">S'inscrire</a>
            </p>
        </div>

    </div>

    <script src="api.js"></script>
    <script src="iublier.js"></script>
</body>

</html>
